<!DOCTYPE html>
<html>
<head>
  <title>Receipt</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h2>Booking Successful ✅</h2>

  <p id="name"></p>
  <p id="address"></p>
  <p id="mobile"></p>
  <p id="cylinder"></p>
  <p id="gas"></p>

  <p>Payment: Cash on Delivery</p>

  <button onclick="window.print()">Print Receipt</button>
</div>

<script>
document.getElementById("name").innerText = "Name: " + localStorage.getItem("name");
document.getElementById("address").innerText = "Address: " + localStorage.getItem("address");
document.getElementById("mobile").innerText = "Mobile: " + localStorage.getItem("mobile");
document.getElementById("cylinder").innerText = "Cylinder: " + localStorage.getItem("cylinder");
document.getElementById("gas").innerText = "Gas: " + localStorage.getItem("gas");
</script>

</body>
</html>
